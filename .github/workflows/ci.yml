---
name: CI/CD - Build & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Addon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate config.yaml
        run: |
          python3 -c "
          import yaml, sys
          with open('antigravity-terminal/config.yaml') as f:
              config = yaml.safe_load(f)
          required = ['name', 'version', 'slug', 'arch', 'startup', 'options', 'schema']
          for field in required:
              if field not in config:
                  print(f'Missing required field: {field}')
                  sys.exit(1)
          print('config.yaml is valid!')
          "

  build:
    name: Build Docker Image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: validate
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            build_from: ghcr.io/home-assistant/amd64-base-debian:trixie
          - arch: aarch64
            runner: ubuntu-latest
            build_from: ghcr.io/home-assistant/aarch64-base-debian:trixie

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./antigravity-terminal
          push: false
          platforms: linux/${{ matrix.arch == 'aarch64' && 'arm64' || 'amd64' }}
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=dev
          tags: antigravity-terminal:${{ matrix.arch }}-dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
