---
name: CI/CD - Validate & Publish Addon

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate Addon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate config.yaml
        run: |
          python3 -c "
          import yaml, sys
          with open('antigravity-terminal/config.yaml') as f:
              config = yaml.safe_load(f)
          required = ['name', 'version', 'slug', 'arch', 'startup', 'options', 'schema']
          for field in required:
              if field not in config:
                  print(f'Missing required field: {field}')
                  sys.exit(1)
          print('config.yaml is valid!')
          "

  publish:
    name: Build & Publish Addon (GHCR)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Addon via HA Builder
        uses: home-assistant/builder@2024.08.1
        with:
          args: |
            --all \
            --target antigravity-terminal \
            --image antigravity-terminal-ha/{arch} \
            --docker-hub ghcr.io/yakilo
