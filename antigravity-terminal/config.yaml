---
name: "Antigravity Console"
description: "Web Console interface for Google DeepMind's Antigravity CLI (agy)"
version: "2.1.1"
slug: "antigravity_terminal"
url: "https://github.com/yakilo/antigravity-terminal-ha"
arch:
  - aarch64
  - amd64
startup: application
init: false

# Ingress configuration - opens directly in HA sidebar
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: mdi:robot-excited-outline
panel_title: "Antigravity"

# File access - Home Assistant config directory
map:
  - config:rw

# API access
hassio_api: true
hassio_role: manager
homeassistant_api: true

# Security
host_network: false
privileged: []
apparmor: true

# User-configurable options
options:
  # Antigravity / Google AI API key
  google_api_key: ""

  # Extra APT packages to install persistently (Debian packages)
  persistent_apt_packages: []

  # Extra pip packages to install persistently
  persistent_pip_packages: []

schema:
  google_api_key: str
  persistent_apt_packages:
    - str
  persistent_pip_packages:
    - str
